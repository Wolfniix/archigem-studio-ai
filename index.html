<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchiGem STUDIO - Architecture & Interior Suite</title>
    <!-- Suppress Tailwind CDN Warning -->
    <script>
      (function() {
        var originalWarn = console.warn;
        console.warn = function(...args) {
          if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
          originalWarn.apply(console, args);
        };
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
              display: ['"Segoe UI"', 'Roboto', 'sans-serif'],
              futura: ['Futura', '"Century Gothic"', '"Segoe UI"', 'sans-serif'],
            },
            colors: {
              architect: {
                50: '#f8f9fa',
                100: '#e9ecef',
                200: '#dee2e6',
                300: '#ced4da',
                400: '#adb5bd',
                500: '#6c757d',
                600: '#495057',
                700: '#343a40',
                800: '#212529',
                900: '#121416',
                accent: '#D90429', // Wolfniix Crimson
                'accent-pressed': '#A61D40', // Wolfniix Dark Crimson (Press/Hover)
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #121416;
        color: #f8f9fa;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #212529;
      }
      ::-webkit-scrollbar-thumb {
        background: #495057;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6c757d;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
